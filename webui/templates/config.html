{% extends "base.html" %}

{% block title %}{{ _('配置中心') }} - Tale WebUI{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/config-cards.css') }}">
{% endblock %}

{% block content %}
<div class="page-header">
    <h1 data-i18n="config.title">配置中心</h1>
    <p class="subtitle" data-i18n="config.subtitle">编辑角色人设、行为参数、平台与服务配置</p>
</div>

<div class="config-layout">
    <!-- 顶部操作栏：模式切换 + 搜索 -->
    <div class="config-topbar">
        <div class="config-mode-switch">
            <button class="mode-btn active" data-mode="card" id="modeCardBtn"><span data-i18n="config.cardMode">卡片模式</span></button>
            <button class="mode-btn" data-mode="source" id="modeSourceBtn"><span data-i18n="config.sourceMode">源码模式</span></button>
        </div>
        <div class="config-search">
            <input type="text" id="configSearch" data-i18n-placeholder="config.searchPlaceholder" placeholder="搜索配置字段...">
            <span class="search-clear" id="searchClear">&times;</span>
        </div>
    </div>

    <!-- 卡片模式：所有 section 的可滚动容器 -->
    <div class="config-sections" id="configSectionsContainer">
        <div class="empty-tip" data-i18n="config.loading">加载中...</div>
    </div>

    <!-- 源码模式面板（默认隐藏） -->
    <div id="sourceModeContainer" style="display:none;">
        <div class="source-toolbar">
            <label data-i18n="config.source.selectDomain">选择配置文件：</label>
            <select id="sourceDomainSelect"></select>
        </div>
        <div id="monacoContainer"></div>
    </div>

    <!-- 底部保存栏 -->
    <div class="config-footer">
        <button class="btn btn-primary" id="btnSaveConfig" data-i18n="config.save">保存配置</button>
        <span id="saveStatus"></span>
    </div>
</div>

<!-- 导入文件输入框（隐藏） -->
<input type="file" id="importFileInput" accept=".yaml,.yml,.json" style="display:none">

<style>
.config-layout {
    padding: 0 28px 10px;
    height: calc(100% - 80px);
    display: flex;
    flex-direction: column;
}
</style>

<script src="{{ url_for('static', filename='js/config-cards.js') }}"></script>
<script>
(function() {
    'use strict';

    // ============ 状态变量 ============

    var tabs = [];
    var allConfigData = {};
    var cardEditors = {};
    var monacoEditor = null;
    var monacoLoading = false;
    var sourceMode = false;
    var currentSourceDomain = '';
    var sectionCollapsedState = {};
    var yamlLib = null;

    var DOMAIN_META = {
        character:  { label: '人设', color: '#6366f1' },
        behavior:   { label: '行为', color: '#10b981' },
        platforms:  { label: '平台', color: '#06b6d4' },
        services:   { label: '服务', color: '#3b82f6' },
        routing:    { label: '路由', color: '#f59e0b' },
        plugins:    { label: '插件', color: '#84cc16' },
    };

    // ============ 工具函数 ============

    function t(key, fallback) {
        if (window.t) { var r = window.t(key); if (r !== key) return r; }
        return fallback || key;
    }

    function showModal(title, placeholder) {
        return new Promise(function(resolve) {
            var overlay = document.createElement('div');
            overlay.className = 'modal-overlay';

            overlay.innerHTML = ''
                + '<div class="modal-dialog">'
                + '<div class="modal-dialog-header">' + title + '</div>'
                + '<div class="modal-dialog-body">'
                + '<input type="text" class="modal-input" placeholder="' + (placeholder || '') + '" autofocus>'
                + '<div class="modal-error"></div>'
                + '</div>'
                + '<div class="modal-dialog-footer">'
                + '<button class="modal-btn modal-cancel">' + t('common.cancel', '取消') + '</button>'
                + '<button class="modal-btn primary modal-confirm">' + t('common.confirm', '确认添加') + '</button>'
                + '</div>'
                + '</div>';

            document.body.appendChild(overlay);

            var input = overlay.querySelector('.modal-input');
            var errorEl = overlay.querySelector('.modal-error');
            var confirmBtn = overlay.querySelector('.modal-confirm');

            function close(val) {
                overlay.style.opacity = '0';
                overlay.style.transition = 'opacity 0.15s';
                setTimeout(function() {
                    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
                }, 200);
                resolve(val);
            }

            confirmBtn.addEventListener('click', function() {
                var val = input.value.trim();
                if (!val) {
                    errorEl.textContent = t('config.nameRequired', '请输入名称');
                    errorEl.style.display = 'block';
                    input.focus();
                    return;
                }
                close(val);
            });

            overlay.querySelector('.modal-cancel').addEventListener('click', function() { close(null); });
            overlay.addEventListener('click', function(e) { if (e.target === overlay) close(null); });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') confirmBtn.click();
                if (e.key === 'Escape') close(null);
            });

            setTimeout(function() { input.focus(); }, 150);
        });
    }

    function showToast(msg) {
        var toast = document.createElement('div');
        toast.className = 'modal-toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        requestAnimationFrame(function() { toast.classList.add('visible'); });
        setTimeout(function() {
            toast.classList.remove('visible');
            setTimeout(function() {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 300);
        }, 2500);
    }

    // ============ Monaco / js-yaml 加载 ============

    function loadScript(src) {
        return new Promise(function(resolve, reject) {
            var s = document.createElement('script');
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
        });
    }

    async function loadJsYaml() {
        try {
            await loadScript('https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js');
            yamlLib = window.jsyaml;
        } catch (e) {
            console.warn('[Config] js-yaml 加载失败', e);
        }
    }

    async function loadMonaco() {
        if (monacoEditor) return;
        if (monacoLoading) return;
        monacoLoading = true;
        try {
            await loadScript('https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js');
            require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
            await new Promise(function(resolve, reject) {
                require(['vs/editor/editor.main'], resolve, reject);
            });
            createMonacoEditor();
        } catch (e) {
            console.error('[Config] Monaco Editor 加载失败', e);
        }
        monacoLoading = false;
    }

    function createMonacoEditor() {
        var container = document.getElementById('monacoContainer');
        if (!container) return;
        monacoEditor = monaco.editor.create(container, {
            value: '',
            language: 'yaml',
            theme: document.documentElement.getAttribute('data-theme') === 'light' ? 'vs' : 'vs-dark',
            minimap: { enabled: false },
            automaticLayout: true,
            fontSize: 13,
            lineNumbers: 'on',
            scrollBeyondLastLine: false,
            wordWrap: 'on',
            tabSize: 2
        });
    }

    // ============ Section 渲染 ============

    function renderAllSections() {
        var container = document.getElementById('configSectionsContainer');
        container.innerHTML = '';

        for (var i = 0; i < tabs.length; i++) {
            var domain = tabs[i].name;
            var meta = DOMAIN_META[domain] || { label: '', color: 'var(--accent)' };
            var title = t('config.section.' + domain, tabs[i].label || domain);
            var desc = t('config.section.' + domain + 'Desc', '');

            var section = document.createElement('section');
            section.className = 'config-section';
            section.id = 'config-section-' + domain;
            section.setAttribute('data-domain', domain);
            section.style.setProperty('--section-color', meta.color);

            if (sectionCollapsedState[domain] !== false) {
                section.classList.add('section-collapsed');
            }

            var charActions = '';
            if (domain === 'character') {
                charActions = ''
                    + '<span class="char-only-actions" style="display:inline-flex;align-items:center;gap:4px;">'
                    + '<select id="presetSelect" style="padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-primary);font-size:13px;">'
                    + '<option value="">— ' + t('config.presetPlaceholder', '预设列表') + ' —</option>'
                    + '</select>'
                    + '<button class="btn btn-sm" id="btnPresetSave">' + t('config.presetSave', '另存为预设') + '</button>'
                    + '<button class="btn btn-sm btn-danger" id="btnPresetDelete">' + t('config.presetDelete', '删除预设') + '</button>'
                    + '<button class="btn btn-sm" id="btnImport">' + t('config.import', '导入') + '</button>'
                    + '<button class="btn btn-sm" id="btnExport">' + t('config.export', '导出') + '</button>'
                    + '</span>';
            }

            section.innerHTML = ''
                + '<div class="section-header" data-action="toggle-section" data-domain="' + domain + '">'
                + '<div class="section-header-left">'
                + '<span class="section-icon" style="background:' + meta.color + '22;color:' + meta.color + ';">' + meta.label + '</span>'
                + '<div class="section-title-group">'
                + '<div class="section-title">' + title + '</div>'
                + (desc ? '<div class="section-desc">' + desc + '</div>' : '')
                + '</div>'
                + '<span class="section-badge" id="badge-' + domain + '">0</span>'
                + '</div>'
                + '<div class="section-header-right">'
                + charActions
                + '<span class="section-collapse-icon">▼</span>'
                + '</div>'
                + '</div>'
                + '<div class="section-body">'
                + '<div class="section-card-container" id="cardContainer-' + domain + '"></div>'
                + '</div>';

            container.appendChild(section);
        }
    }

    function createCardSection(name, data) {
        allConfigData[name] = data;
        var container = document.getElementById('cardContainer-' + name);
        if (!container) return;

        var editor = new ConfigCards(container, name, data);
        editor.render();
        cardEditors[name] = editor;

        updateSectionBadge(name);
    }

    function updateSectionBadge(name) {
        var badge = document.getElementById('badge-' + name);
        var editor = cardEditors[name];
        if (badge && editor) {
            var count = editor.getCardCount();
            badge.textContent = t('config.section.cardsCount', '{count} 卡片').replace('{count}', count);
        }
    }

    function updateSectionVisibility(query) {
        var sections = document.querySelectorAll('.config-section');
        for (var i = 0; i < sections.length; i++) {
            var section = sections[i];
            var domain = section.getAttribute('data-domain');
            var editor = cardEditors[domain];
            if (!editor) continue;

            if (!query) {
                section.classList.remove('section-empty');
            } else {
                var visible = editor.getVisibleCardCount();
                section.classList.toggle('section-empty', visible === 0);
            }
        }
    }

    // ============ Section 手风琴折叠 ============

    function toggleSection(domain) {
        var section = document.getElementById('config-section-' + domain);
        if (!section) return;

        var wasCollapsed = section.classList.contains('section-collapsed');

        if (wasCollapsed) {
            // 手风琴：先折叠所有其他 section
            var allSections = document.querySelectorAll('.config-section');
            for (var i = 0; i < allSections.length; i++) {
                allSections[i].classList.add('section-collapsed');
                var d = allSections[i].getAttribute('data-domain');
                if (d) sectionCollapsedState[d] = true;
            }
            // 展开当前
            section.classList.remove('section-collapsed');
            sectionCollapsedState[domain] = false;
            setTimeout(function() {
                section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        } else {
            // 折叠当前
            section.classList.add('section-collapsed');
            sectionCollapsedState[domain] = true;
        }
    }

    // ============ 搜索 ============

    var searchInput = document.getElementById('configSearch');
    var searchClear = document.getElementById('searchClear');

    searchInput.addEventListener('input', function() {
        var q = searchInput.value.trim().toLowerCase();
        searchClear.style.display = q ? 'block' : 'none';

        if (sourceMode && monacoEditor) {
            if (q) {
                monacoEditor.getModel().findMatches(q, false, true, false, null, true);
            }
            return;
        }

        for (var name in cardEditors) {
            if (cardEditors.hasOwnProperty(name)) {
                cardEditors[name].search(q);
            }
        }
        updateSectionVisibility(q);
    });

    searchClear.addEventListener('click', function() {
        searchInput.value = '';
        searchInput.dispatchEvent(new Event('input'));
    });

    // ============ 模式切换 ============

    async function switchToSourceMode() {
        if (!yamlLib || !monacoEditor) {
            await loadMonaco();
            if (!monacoEditor) {
                alert('Monaco Editor 加载失败');
                return;
            }
        }

        for (var name in cardEditors) {
            if (cardEditors.hasOwnProperty(name)) {
                allConfigData[name] = cardEditors[name].collectData();
            }
        }

        if (!currentSourceDomain && tabs.length > 0) {
            currentSourceDomain = tabs[0].name;
        }
        fillSourceDomainSelect();
        await loadSourceDomainYaml();

        sourceMode = true;
        document.getElementById('modeSourceBtn').classList.add('active');
        document.getElementById('modeCardBtn').classList.remove('active');
        document.getElementById('configSectionsContainer').style.display = 'none';
        document.getElementById('sourceModeContainer').style.display = 'flex';

        setTimeout(function() {
            if (monacoEditor) monacoEditor.layout();
        }, 50);
    }

    function switchToCardMode() {
        if (!monacoEditor) {
            // Monaco 未初始化的可能性较低，做容错处理
            alert('编辑器尚未加载，请稍后再试');
            return;
        }
        var yamlStr = monacoEditor.getValue();
        if (!yamlLib) {
            alert('js-yaml 未加载，无法切换到卡片模式');
            return;
        }
        var parsed;
        try {
            parsed = yamlLib.load(yamlStr);
        } catch (e) {
            alert('YAML 格式错误，请修正后再切换卡片模式:\n' + e.message);
            return;
        }
        if (!parsed || typeof parsed !== 'object') {
            alert('YAML 内容无效，请检查');
            return;
        }

        allConfigData[currentSourceDomain] = parsed;
        createCardSection(currentSourceDomain, parsed);

        sourceMode = false;
        document.getElementById('modeCardBtn').classList.add('active');
        document.getElementById('modeSourceBtn').classList.remove('active');
        document.getElementById('configSectionsContainer').style.display = '';
        document.getElementById('sourceModeContainer').style.display = 'none';
    }

    document.getElementById('modeCardBtn').addEventListener('click', function() {
        if (sourceMode) switchToCardMode();
    });

    document.getElementById('modeSourceBtn').addEventListener('click', function() {
        if (!sourceMode) switchToSourceMode();
    });

    function fillSourceDomainSelect() {
        var select = document.getElementById('sourceDomainSelect');
        select.innerHTML = tabs.map(function(t) {
            var sel = t.name === currentSourceDomain ? ' selected' : '';
            return '<option value="' + t.name + '"' + sel + '>' + (t.label || t.name) + '</option>';
        }).join('');
    }

    document.getElementById('sourceDomainSelect').addEventListener('change', async function() {
        if (monacoEditor && currentSourceDomain) {
            try {
                var yamlStr = monacoEditor.getValue();
                var parsed = yamlLib.load(yamlStr);
                allConfigData[currentSourceDomain] = parsed;
                createCardSection(currentSourceDomain, parsed);
            } catch (e) { /* keep editor content */ }
        }
        currentSourceDomain = this.value;
        await loadSourceDomainYaml();
    });

    async function loadSourceDomainYaml() {
        if (!currentSourceDomain) return;
        try {
            var res = await fetch('/api/config/' + currentSourceDomain + '/raw');
            var text = await res.text();
            if (monacoEditor) monacoEditor.setValue(text);
        } catch (e) {
            if (monacoEditor) monacoEditor.setValue('');
        }
    }

    // ============ 保存 ============

    document.getElementById('btnSaveConfig').addEventListener('click', async function() {
        if (sourceMode && monacoEditor) {
            await saveRawYaml();
        } else {
            await saveAllCardData();
        }
    });

    async function saveAllCardData() {
        var status = document.getElementById('saveStatus');
        var errors = [];
        var successCount = 0;

        for (var name in cardEditors) {
            if (!cardEditors.hasOwnProperty(name)) continue;
            try {
                var data = cardEditors[name].collectData();
                allConfigData[name] = data;
                var res = await fetch('/api/config/' + name, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                var result = await res.json();
                if (result.ok) {
                    successCount++;
                } else {
                    errors.push(name);
                }
            } catch (e) {
                errors.push(name);
            }
        }

        if (errors.length === 0) {
            status.textContent = t('config.saved', '[OK] 已保存');
        } else {
            status.textContent = t('config.saveFailed', '[X] 保存失败') + ': ' + errors.join(', ');
        }
        setTimeout(function() { status.textContent = ''; }, 3000);
    }

    async function saveRawYaml() {
        var status = document.getElementById('saveStatus');
        var yamlStr = monacoEditor.getValue();
        try {
            if (yamlLib) {
                try { yamlLib.load(yamlStr); } catch (e) {
                    status.textContent = '[X] YAML 语法错误: ' + e.message;
                    setTimeout(function() { status.textContent = ''; }, 4000);
                    return;
                }
            }
            var res = await fetch('/api/config/' + currentSourceDomain + '/raw', {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain; charset=utf-8' },
                body: yamlStr
            });
            var result = await res.json();
            if (result.ok) {
                status.textContent = t('config.saved', '[OK] 已保存');
                setTimeout(function() { status.textContent = ''; }, 2000);
            } else {
                status.textContent = t('config.saveFailed', '[X] 保存失败');
            }
        } catch (e) {
            status.textContent = t('config.networkError', '[X] 网络错误');
        }
    }

    // ============ 预设 / 导入 / 导出 ============

    async function loadPresets() {
        try {
            var res = await fetch('/api/config/presets');
            var presets = await res.json();
            var select = document.getElementById('presetSelect');
            if (!select) return;
            select.innerHTML = '<option value="">— ' + t('config.presetPlaceholder', '预设列表') + ' —</option>'
                + presets.map(function(p) { return '<option value="' + p.name + '">' + p.name + '</option>'; }).join('');
        } catch (e) {
            console.warn('[Config] 加载预设列表失败', e);
        }
    }

    // 通过事件委托处理 section 内的按钮点击
    document.getElementById('configSectionsContainer').addEventListener('click', function(e) {
        var target = e.target;

        var headerEl = target.closest('[data-action="toggle-section"]');
        if (headerEl) {
            toggleSection(headerEl.dataset.domain);
            return;
        }

        if (target.closest('#btnPresetSave')) {
            savePreset();
            return;
        }

        if (target.closest('#btnPresetDelete')) {
            deletePreset();
            return;
        }

        if (target.closest('#btnImport')) {
            document.getElementById('importFileInput').click();
            return;
        }

        if (target.closest('#btnExport')) {
            window.open('/api/config/export', '_blank');
            return;
        }
    });

    document.getElementById('configSectionsContainer').addEventListener('change', async function(e) {
        if (e.target.id === 'presetSelect') {
            var name = e.target.value;
            if (!name) return;
            if (!confirm('确定要切换人设到「' + name + '」吗？当前未保存的修改将丢失。')) {
                e.target.value = '';
                return;
            }
            var status = document.getElementById('saveStatus');
            try {
                var res = await fetch('/api/config/presets/' + encodeURIComponent(name) + '/apply', { method: 'POST' });
                var result = await res.json();
                if (result.ok) {
                    status.textContent = '[OK] 已切换到「' + name + '」';
                    setTimeout(function() { status.textContent = ''; }, 2000);
                    await reloadCharacterSection();
                } else {
                    status.textContent = '[X] 切换失败';
                }
            } catch (ex) {
                status.textContent = t('config.networkError', '[X] 网络错误');
            }
        }
    });

    async function savePreset() {
        var name = await showModal(
            t('config.presetSaveTitle', '保存预设'),
            t('config.presetSavePlaceholder', '请输入预设名称')
        );
        if (!name) return;
        var status = document.getElementById('saveStatus');

        if (!sourceMode && cardEditors['character']) {
            allConfigData['character'] = cardEditors['character'].collectData();
            try {
                await fetch('/api/config/character', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(allConfigData['character'])
                });
            } catch (e) { /* continue */ }
        }

        try {
            var res = await fetch('/api/config/presets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name.trim() })
            });
            var result = await res.json();
            if (result.ok) {
                status.textContent = '[OK] 预设已保存';
                setTimeout(function() { status.textContent = ''; }, 2000);
                loadPresets();
            } else {
                status.textContent = '[X] ' + (result.error || '保存失败');
            }
        } catch (e) {
            status.textContent = t('config.networkError', '[X] 网络错误');
        }
    }

    async function deletePreset() {
        var select = document.getElementById('presetSelect');
        if (!select) return;
        var name = select.value;
        if (!name) { showToast(t('config.noPresetSelected', '请先选择一个预设')); return; }
        if (!confirm('确定要删除预设「' + name + '」吗？')) return;
        var status = document.getElementById('saveStatus');
        try {
            var res = await fetch('/api/config/presets/' + encodeURIComponent(name), { method: 'DELETE' });
            var result = await res.json();
            if (result.ok) {
                status.textContent = '[OK] 预设已删除';
                setTimeout(function() { status.textContent = ''; }, 2000);
                loadPresets();
            }
        } catch (e) {
            status.textContent = t('config.networkError', '[X] 删除失败');
        }
    }

    async function reloadCharacterSection() {
        try {
            var res = await fetch('/api/config/character');
            var data = await res.json();
            createCardSection('character', data);
        } catch (e) {
            console.warn('[Config] 重新加载角色配置失败', e);
        }
    }

    // 导入文件
    document.getElementById('importFileInput').addEventListener('change', async function(e) {
        var file = e.target.files[0];
        if (!file) return;
        var formData = new FormData();
        formData.append('file', file);
        var status = document.getElementById('saveStatus');
        try {
            var res = await fetch('/api/config/import', { method: 'POST', body: formData });
            var result = await res.json();
            if (result.ok) {
                status.textContent = '[OK] 导入成功';
                setTimeout(function() { status.textContent = ''; }, 2000);
                await reloadCharacterSection();
            } else {
                status.textContent = '[X] 导入失败: ' + (result.error || '未知错误');
            }
        } catch (ex) {
            status.textContent = '[X] 导入失败: 网络错误';
        }
        e.target.value = '';
    });

    // ============ Hash 导航（侧边栏子菜单跳转） ============

    function handleHashChange() {
        var hash = location.hash;
        if (!hash) return;
        var targetId = hash.replace('#', '');
        var target = document.getElementById(targetId);
        if (target) {
            // 手风琴：先折叠所有
            var allSections = document.querySelectorAll('.config-section');
            for (var i = 0; i < allSections.length; i++) {
                allSections[i].classList.add('section-collapsed');
                var d = allSections[i].getAttribute('data-domain');
                if (d) sectionCollapsedState[d] = true;
            }
            // 展开目标
            target.classList.remove('section-collapsed');
            var domain = target.getAttribute('data-domain');
            if (domain) {
                sectionCollapsedState[domain] = false;
            }
            setTimeout(function() {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                target.classList.add('section-highlight');
                setTimeout(function() {
                    target.classList.remove('section-highlight');
                }, 1500);
            }, 100);
        }
    }

    window.addEventListener('hashchange', handleHashChange);

    // ============ 主题适配 ============

    var themeObserver = new MutationObserver(function() {
        if (monacoEditor) {
            var isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            monaco.editor.setTheme(isDark ? 'vs-dark' : 'vs');
        }
    });
    themeObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    // ============ 初始化 ============

    async function init() {
        loadJsYaml();  // 非阻塞加载，仅源码模式需要
        loadMonaco();  // 后台加载

        try {
            var res = await fetch('/api/config');
            tabs = await res.json();
        } catch (e) {
            document.getElementById('configSectionsContainer').innerHTML = '<div class="empty-tip">' + t('config.loadFailed', '加载失败') + '</div>';
            return;
        }

        // 渲染所有 Section 的 DOM 框架
        renderAllSections();

        // 并行加载所有配置域数据
        var loadPromises = tabs.map(function(tab) {
            return fetch('/api/config/' + tab.name)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    allConfigData[tab.name] = data;
                })
                .catch(function() {
                    allConfigData[tab.name] = {};
                });
        });
        await Promise.all(loadPromises);

        // 为每个域创建卡片编辑器
        for (var i = 0; i < tabs.length; i++) {
            createCardSection(tabs[i].name, allConfigData[tabs[i].name]);
        }

        // 加载预设列表
        loadPresets();

        // 设置源码模式默认域名
        if (tabs.length > 0) currentSourceDomain = tabs[0].name;

        // 处理初始 hash（来自侧边栏子菜单的导航）
        if (location.hash) {
            setTimeout(handleHashChange, 300);
        }
    }

    init();
})();
</script>
{% endblock %}
